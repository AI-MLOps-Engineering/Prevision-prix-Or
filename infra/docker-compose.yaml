version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: gold-api
    ports:
      - "8000:8000"
    restart: always

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    container_name: gold-ui
    ports:
      - "8501:8501"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: gold-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - ui
    restart: always
